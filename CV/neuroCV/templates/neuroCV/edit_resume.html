{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0"><i class="fa-solid fa-pen-to-square"></i> Edit Resume: {{ resume.full_name }}</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ resume.full_name }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ resume.email }}">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-primary">AI-Generated Professional Profile</label>
                    <textarea name="ai_bullets" class="form-control" rows="6" style="background-color: #f8fafc;">{{ resume.ai_bullets }}</textarea>
                    <div class="form-text mt-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> This was generated by Gemini. You can manually edit it to perfect your profile.
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Original Work Responsibilities</label>
                    <textarea name="responsibilities" class="form-control" rows="4">{{ resume.responsibilities }}</textarea>
                </div>

                <div class="d-flex gap-2 pt-3 border-top">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fa-solid fa-save"></i> Save Changes
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">
                        Discard Changes
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .card { border-radius: 12px; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25); }
    .btn { border-radius: 8px; font-weight: 600; transition: 0.3s; }
</style>
{% endblock %}
