{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 p-4" style="border-radius: 15px;">
                <h4 class="fw-bold mb-3">Change Your Password</h4>
                <p class="text-muted small">Please enter your old password and then your new one twice.</p>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Update Password</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-light">Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Makes the Django auto-form look better with Bootstrap */
    form p label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
    form p input { 
        display: block; 
        width: 100%; 
        padding: .375rem .75rem; 
        border: 1px solid #ced4da; 
        border-radius: .375rem; 
    }
    .helptext { font-size: 0.75rem; color: #6c757d; display: block; margin-top: 5px; }
</style>
{% endblock %}
