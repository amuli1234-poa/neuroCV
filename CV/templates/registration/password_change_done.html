{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card shadow-sm border-0 p-5" style="border-radius: 20px; background: white;">
                <div class="mb-4">
                    <div class="success-icon">
                        <span style="font-size: 3rem;">Check</span>
                    </div>
                </div>

                <h2 class="fw-bold text-dark">Password Updated!</h2>
                <p class="text-muted mb-4">
                    Your security credentials have been successfully changed. 
                    You can now continue managing your resumes.
                </p>

                <div class="d-grid gap-2">
                    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg shadow-sm" style="border-radius: 10px;">
                        Return to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --success-green: #22c55e;
    }
    
    .success-icon {
        width: 80px;
        height: 80px;
        background-color: #f0fdf4;
        color: var(--success-green);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
        border: 2px solid #dcfce7;
    }

    body {
        background-color: #f8fafc;
    }
</style>
{% endblock %}
